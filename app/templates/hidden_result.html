{% extends "base.html" %}
{% block title %}ラーメンばんざい！ | ラーメン免罪符{% endblock %}
{% block content %}
<section class="result-page banzai">
  <article
    class="banzai-result certificate-enter"
    id="certificate"
    data-result-type="banzai"
    data-download-image="{{ url_for('static', path='images/banzai.png') }}"
    data-seal-image="{{ url_for('static', path='images/menai.png') }}"
  >
    <img src="{{ url_for('static', path='images/banzai.png') }}" alt="万歳するシスター">
    <h1><span>ラーメン</span><span>ばんざい！</span></h1>
    <img
      class="result-seal banzai-seal"
      src="{{ url_for('static', path='images/menai.png') }}"
      alt="麺愛永遠"
    >
  </article>

  <div class="share-tools reveal">
    <button class="button download-button" id="download-certificate" type="button" data-filename="ramen-banzai.png">
      診断結果を画像で保存
    </button>
    <a class="button x-button" href="{{ share_url }}" target="_blank" rel="noopener">
      診断結果をツイート
    </a>
    <p class="share-status" id="share-status" aria-live="polite"></p>
  </div>

  <div class="result-actions reveal">
    <a class="button retry-button" href="/">懺悔室へ戻る</a>
  </div>
  <p class="result-total">これまでに <b>{{ total }}</b> 回、ラーメン欲が審議されました。</p>
</section>
{% endblock %}
