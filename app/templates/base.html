<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="今日ラーメンを食べていい理由を積み上げ、ラーメン免罪符を発行するジョークアプリ。">
  <meta name="theme-color" content="#110b15">
  <meta property="og:title" content="ラーメン免罪符">
  <meta property="og:description" content="理由を積み上げ、本日のラーメン免罪を言い渡します。">
  <title>{% block title %}ラーメン免罪符{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <header class="site-header">
    <a class="brand" href="/">
      <span class="brand-mark">免</span>
      <span>ラーメン免罪符</span>
    </a>
    <nav aria-label="メインナビゲーション">
      {% if show_stats %}
      <a href="/stats" data-stats-link>統計</a>
      {% endif %}
      <a href="/about">このアプリについて</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer>
    <p>ラーメン免罪符 — 理由を集めて、堂々と食べよう。</p>
    <p class="footer-note">本サービスは健康・医療上の助言を提供するものではありません。</p>
  </footer>
  <script src="{{ url_for('static', path='script.js') }}" type="module"></script>
</body>
</html>
